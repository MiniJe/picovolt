<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PicoVolt Tasks — a board that remembers everything</title>
    <style>
      :root {
        --bg: #080a12; --bg2: #0d1020; --panel: #10131f; --border: #232843;
        --text: #e7e9f3; --muted: #9097b4; --faint: #6b7298;
        --violet: #7c5cff; --cyan: #18e0ff; --green: #3ddc97; --amber: #ffb340; --red: #ff6b81;
        --mono: "JetBrains Mono", ui-monospace, "SF Mono", Consolas, monospace;
        --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
      a { color: var(--cyan); text-decoration: none; }
      .mono { font-family: var(--mono); }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 0 22px; }
      .grad { background: linear-gradient(100deg, var(--violet), var(--cyan)); -webkit-background-clip: text; background-clip: text; color: transparent; }

      header { border-bottom: 1px solid var(--border); background: rgba(8,10,18,.7); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 20; }
      header .wrap { display: flex; align-items: center; gap: 16px; height: 60px; }
      .logo { font-weight: 700; font-size: 17px; display: flex; align-items: center; gap: 8px; }
      .logo .b { color: var(--cyan); filter: drop-shadow(0 0 8px var(--cyan)); }
      .tag { color: var(--faint); font-size: 13px; }
      header .sp { margin-left: auto; }
      .btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 14px; border-radius: 8px; font-size: 13.5px; font-weight: 600; border: 1px solid var(--border); color: var(--text); cursor: pointer; background: #161a2e; transition: .14s; font-family: var(--sans); }
      .btn:hover { border-color: var(--violet); color: #fff; }
      .btn.sm { padding: 5px 9px; font-size: 12px; }
      .btn.primary { background: linear-gradient(100deg, var(--violet), #5b7cff); border: none; color: #fff; }
      .btn:disabled { opacity: .4; cursor: not-allowed; }

      /* time machine */
      .timemachine { margin: 22px 0; border: 1px solid var(--border); border-radius: 14px; background: var(--panel); padding: 16px 18px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
      .tm-label { font-family: var(--mono); font-size: 13px; min-width: 150px; }
      .tm-label .badge { font-weight: 700; }
      .badge.live { color: var(--green); } .badge.hist { color: var(--amber); }
      input[type=range] { flex: 1 1 280px; accent-color: var(--violet); height: 4px; }
      .tm-hint { font-size: 12px; color: var(--faint); font-family: var(--mono); }

      /* board */
      .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 30px; }
      .col { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 14px; min-height: 220px; display: flex; flex-direction: column; }
      .col h2 { margin: 0 0 12px; font-size: 13px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); display: flex; align-items: center; gap: 8px; }
      .dot { width: 9px; height: 9px; border-radius: 50%; }
      .col.todo .dot { background: var(--faint); } .col.doing .dot { background: var(--amber); } .col.done .dot { background: var(--green); }
      .count { margin-left: auto; font-family: var(--mono); color: var(--faint); font-weight: 400; }
      .cards { display: flex; flex-direction: column; gap: 9px; flex: 1; }
      .card { background: #161a2c; border: 1px solid var(--border); border-radius: 10px; padding: 11px 12px; display: flex; align-items: flex-start; gap: 8px; animation: pop .15s ease; }
      @keyframes pop { from { transform: scale(.97); opacity: .4; } }
      .card .title { flex: 1; font-size: 14px; line-height: 1.45; word-break: break-word; }
      .col.done .card .title { color: var(--muted); text-decoration: line-through; }
      .card .acts { display: flex; gap: 4px; flex-shrink: 0; }
      .iconbtn { width: 24px; height: 24px; border-radius: 6px; border: 1px solid var(--border); background: #1c2138; color: var(--muted); cursor: pointer; font-size: 13px; line-height: 1; display: grid; place-items: center; }
      .iconbtn:hover { color: #fff; border-color: var(--violet); }
      .empty { color: var(--faint); font-size: 13px; font-style: italic; padding: 8px 2px; }
      .addrow { display: flex; gap: 8px; margin-top: 10px; }
      .addrow input { flex: 1; background: #0b0e1a; border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 9px 11px; font-size: 13.5px; font-family: var(--sans); outline: none; }
      .addrow input:focus { border-color: var(--violet); }

      .statusbar { display: flex; align-items: center; gap: 14px; color: var(--faint); font-size: 12.5px; font-family: var(--mono); padding: 4px 0 40px; flex-wrap: wrap; }
      .led { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 9px var(--green); }
      .readonly-veil { font-family: var(--mono); font-size: 12.5px; color: var(--amber); }
      .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #161a2c; border: 1px solid var(--border); border-radius: 9px; padding: 10px 16px; font-size: 13px; opacity: 0; transition: opacity .2s; pointer-events: none; }
      .toast.show { opacity: 1; }
      @media (max-width: 720px) { .board { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap">
        <span class="logo"><span class="b">⚡</span> PicoVolt <span class="grad">Tasks</span></span>
        <span class="tag">a board that remembers <em>everything</em></span>
        <span class="sp"></span>
        <button class="btn sm" id="export">⭳ Export .pvdb</button>
        <button class="btn sm" id="import">⭱ Import</button>
        <input type="file" id="file" accept=".pvdb,application/octet-stream" hidden />
        <a class="btn sm" href="./index.html">About ↗</a>
      </div>
    </header>

    <main class="wrap">
      <div class="timemachine" id="tm" style="display:none">
        <div class="tm-label">🕓 Time machine<br /><span id="tm-state" class="badge live">● LIVE</span></div>
        <input type="range" id="slider" min="0" max="0" value="0" />
        <button class="btn sm" id="now">Return to now</button>
        <div class="tm-hint" id="tm-hint">drag to replay every change</div>
      </div>

      <div class="board" id="board"></div>

      <div class="statusbar">
        <span class="led" id="led"></span>
        <span id="engine">booting WebAssembly…</span>
        <span id="counts"></span>
      </div>
    </main>

    <div class="toast" id="toast"></div>

    <script type="module">
      import init, { Db } from "./pkg/picovolt.js";

      const STORAGE_KEY = "picovolt.tasks.v1";
      const STATUSES = ["todo", "doing", "done"];
      const TITLES = { todo: "To Do", doing: "Doing", done: "Done" };
      const $ = (id) => document.getElementById(id);

      let db = null;
      let viewTx = null; // null === live (current)

      const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
      const q = (sql) => JSON.parse(db.query(sql));
      const sqlStr = (s) => "'" + String(s).replace(/'/g, "''") + "'"; // (engine treats '' inside quotes as part of the string)
      function toast(msg) { const t = $("toast"); t.textContent = msg; t.classList.add("show"); clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove("show"), 1800); }

      // ---- persistence (export the .pvdb image to localStorage) ----
      const b64 = {
        enc: (u8) => { let s = ""; for (const b of u8) s += String.fromCharCode(b); return btoa(s); },
        dec: (str) => { const s = atob(str); const u8 = new Uint8Array(s.length); for (let i = 0; i < s.length; i++) u8[i] = s.charCodeAt(i); return u8; },
      };
      function persist() { try { localStorage.setItem(STORAGE_KEY, b64.enc(db.export())); } catch (e) { /* storage full / unavailable */ } }

      function seed() {
        db.query("CREATE TABLE tasks (id, title, status)");
        db.query("CREATE INDEX ON tasks (status)");
        const demo = [
          ["Try the time machine ↑", "doing"],
          ["Drag a card between columns", "todo"],
          ["Export this board to a .pvdb file", "todo"],
          ["Read PicoVolt's source", "todo"],
          ["Compile a Rust DB to WebAssembly", "done"],
        ];
        demo.forEach(([t, s], i) => db.query(`INSERT INTO tasks VALUES (${i + 1}, ${sqlStr(t)}, ${sqlStr(s)})`));
      }

      // ---- data helpers ----
      function liveTasks() { return q("SELECT * FROM tasks").rows; }
      function tasksAt(tx) { return q(`SELECT * FROM tasks BEFORE ${tx}`).rows; }
      function nextId() { const rows = liveTasks(); return rows.length ? Math.max(...rows.map((r) => r[0])) + 1 : 1; }
      const isLive = () => viewTx === null || viewTx >= db.currentTx();

      // ---- actions (only when live) ----
      function addTask(title) {
        title = title.trim(); if (!title || !isLive()) return;
        db.query(`INSERT INTO tasks VALUES (${nextId()}, ${sqlStr(title)}, 'todo')`);
        afterChange();
      }
      function moveTask(id, dir) {
        if (!isLive()) return;
        const row = liveTasks().find((r) => r[0] === id); if (!row) return;
        const i = STATUSES.indexOf(row[2]); const ni = Math.max(0, Math.min(2, i + dir));
        if (ni === i) return;
        db.query(`UPDATE tasks SET status = ${sqlStr(STATUSES[ni])} WHERE id = ${id}`);
        afterChange();
      }
      function deleteTask(id) {
        if (!isLive()) return;
        db.query(`DELETE FROM tasks WHERE id = ${id}`);
        afterChange();
      }
      function afterChange() { persist(); viewTx = null; render(); }

      // ---- render ----
      function render() {
        const live = isLive();
        const max = db.currentTx();
        const rows = live ? liveTasks() : tasksAt(viewTx);
        const byStatus = { todo: [], doing: [], done: [] };
        for (const [id, title, status] of rows) (byStatus[status] || byStatus.todo).push({ id, title });

        const board = $("board");
        board.innerHTML = "";
        for (const st of STATUSES) {
          const items = byStatus[st];
          const col = document.createElement("div");
          col.className = "col " + st;
          let h = `<h2><span class="dot"></span>${TITLES[st]}<span class="count">${items.length}</span></h2><div class="cards">`;
          if (!items.length) h += `<div class="empty">nothing here</div>`;
          for (const t of items) {
            const acts = live
              ? `<div class="acts">${st !== "todo" ? `<button class="iconbtn" data-mv="${t.id}" data-dir="-1" title="move left">‹</button>` : ""}` +
                `${st !== "done" ? `<button class="iconbtn" data-mv="${t.id}" data-dir="1" title="move right">›</button>` : ""}` +
                `<button class="iconbtn" data-del="${t.id}" title="delete">×</button></div>`
              : "";
            h += `<div class="card"><span class="title">${esc(t.title)}</span>${acts}</div>`;
          }
          h += `</div>`;
          if (st === "todo" && live) {
            h += `<div class="addrow"><input id="newtask" placeholder="Add a task and press Enter…" /></div>`;
          }
          col.innerHTML = h;
          board.appendChild(col);
        }

        // wire card buttons
        board.querySelectorAll("[data-mv]").forEach((b) => (b.onclick = () => moveTask(+b.dataset.mv, +b.dataset.dir)));
        board.querySelectorAll("[data-del]").forEach((b) => (b.onclick = () => deleteTask(+b.dataset.del)));
        const nt = $("newtask");
        if (nt) nt.onkeydown = (e) => { if (e.key === "Enter") { addTask(nt.value); } };

        // time machine
        const tm = $("tm");
        tm.style.display = max > 0 ? "flex" : "none";
        const slider = $("slider");
        slider.max = max;
        slider.value = live ? max : viewTx;
        $("tm-state").className = "badge " + (live ? "live" : "hist");
        $("tm-state").innerHTML = live ? "● LIVE" : `⏪ history`;
        $("tm-hint").textContent = live ? "drag to replay every change" : `viewing tx ${viewTx} of ${max} · read-only`;
        $("now").disabled = live;

        // status bar
        $("counts").textContent = `· ${rows.length} task${rows.length === 1 ? "" : "s"} · ${max} transactions`;
      }

      // ---- boot ----
      $("slider").addEventListener("input", (e) => { viewTx = +e.target.value; render(); });
      $("now").onclick = () => { viewTx = null; render(); };
      $("export").onclick = () => {
        const blob = new Blob([db.export()], { type: "application/octet-stream" });
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "tasks.pvdb"; a.click(); URL.revokeObjectURL(a.href);
        toast("Exported tasks.pvdb");
      };
      $("import").onclick = () => $("file").click();
      $("file").onchange = async (e) => {
        const f = e.target.files[0]; if (!f) return;
        try {
          const bytes = new Uint8Array(await f.arrayBuffer());
          db = Db.fromBytes(bytes); // writable, history intact
          viewTx = null; persist(); render(); toast("Imported " + f.name);
        } catch (err) { toast("Import failed: " + err); }
        e.target.value = "";
      };

      (async () => {
        await init();
        const saved = localStorage.getItem(STORAGE_KEY);
        try {
          db = saved ? Db.fromBytes(b64.dec(saved)) : new Db();
        } catch (e) {
          db = new Db(); // corrupt save → start fresh
        }
        if (!db.currentTx || db.currentTx() === 0) { db = new Db(); seed(); persist(); }
        $("engine").textContent = "PicoVolt · in your browser (WebAssembly)";
        render();
      })();
    </script>
  </body>
</html>
