name: Python wheels

# Builds platform wheels for the ctypes binding (each bundles the compiled C ABI
# shared library) and, on a version tag, publishes them to PyPI if the
# PYPI_API_TOKEN secret is set.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  wheels:
    name: wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: bindings/python
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build the C ABI shared library
        working-directory: .
        run: cargo build --release --features capi

      - name: Bundle the library into the package
        shell: bash
        run: |
          mkdir -p picovolt
          if [ -f ../../target/release/libpicovolt.so ]; then cp ../../target/release/libpicovolt.so picovolt/; fi
          if [ -f ../../target/release/libpicovolt.dylib ]; then cp ../../target/release/libpicovolt.dylib picovolt/; fi
          if [ -f ../../target/release/picovolt.dll ]; then cp ../../target/release/picovolt.dll picovolt/; fi

      - name: Build the wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Smoke test the wheel
        shell: bash
        run: |
          python -m pip install dist/*.whl
          python - <<'PY'
          from picovolt import Database, version
          db = Database.open_memory()
          db.query("CREATE TABLE t (x)")
          db.query("INSERT INTO t VALUES (1)")
          assert db.query("SELECT * FROM t")["rows"] == [[1]]
          print("wheel ok:", version())
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: bindings/python/dist/*.whl

  publish:
    name: publish to PyPI
    needs: wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish (skips cleanly if no token)
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$PYPI_API_TOKEN" ]; then
            echo "PYPI_API_TOKEN not set; skipping publish."
            exit 0
          fi
          python -m pip install --upgrade twine
          twine upload --username __token__ --password "$PYPI_API_TOKEN" dist/*.whl
