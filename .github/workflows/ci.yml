name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Clippy (capi)
        run: cargo clippy --all-targets --features capi -- -D warnings
      - name: Test
        run: cargo test --all-targets
      - name: Test (capi)
        run: cargo test --all-targets --features capi
      - name: Doc tests
        run: cargo test --doc

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  wasm:
    name: wasm32 + js bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build wasm32 with JS bindings
        run: cargo build --target wasm32-unknown-unknown --features wasm

  fuzz-build:
    name: fuzz-build (nightly)
    runs-on: ubuntu-latest
    # cargo-fuzz sets its own RUSTFLAGS; don't inherit `-D warnings`.
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: Build fuzz targets (compile check)
        # Pin the host target: cargo-fuzz otherwise defaults to musl, whose std
        # isn't installed on the runner (E0463: can't find crate for `core`).
        run: cargo fuzz build --sanitizer none --target x86_64-unknown-linux-gnu

  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Every commit has a Signed-off-by line
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          fail=0
          for c in $(git rev-list --no-merges "$base..$head"); do
            if ! git show -s --format=%B "$c" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::commit $c is missing a Signed-off-by line (use 'git commit -s')"
              fail=1
            fi
          done
          exit $fail
