name: Feature request
description: Suggest a capability or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Lead with the **problem**, not just the feature. Concrete use cases are
        what move items up the [roadmap](../blob/main/ROADMAP.md).
  - type: textarea
    id: problem
    attributes:
      label: The problem / use case
      description: What are you trying to do that PicoVolt makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like it to do? API sketches welcome.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried, or other designs you weighed.
    validations:
      required: false
